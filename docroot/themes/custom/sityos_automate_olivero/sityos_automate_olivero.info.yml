name: 'Sityos Automate Olivero'
type: theme
description: 'Tech/SaaS theme for Sityos Automate. Olivero subtheme with dark/light mode, modern CSS innovations, and editorial SDC components.'
package: Sityos
core_version_requirement: ^11
base theme: olivero
version: 1.0.0

libraries:
  - sityos_automate_olivero/global-styling

regions:
  header: Header
  primary_menu: Primary menu
  secondary_menu: Secondary menu
  hero: 'Hero (full width)'
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  social: Social Bar
  content_above: Content Above
  content: Content
  sidebar: Sidebar
  content_below: Content Below
  footer_top: Footer Top
  footer_bottom: Footer Bottom

components:
  namespaces:
    sityos_automate_olivero: components
