$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Feature Grid'
status: experimental
description: 'Grid of feature cards with icon, title, and description. Supports container queries and contextual :has() styling.'
group: 'Sityos Automate'
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
    subtitle:
      type: string
      title: Subtitle
    items:
      type: array
      title: Items
      items:
        type: object
        properties:
          icon:
            type: string
            title: 'Icon SVG markup or emoji'
          title:
            type: string
            title: Title
          description:
            type: string
            title: Description
          url:
            type: string
            title: URL
    columns:
      type: integer
      title: Columns
      enum: [2, 3, 4]
      default: 3
    variant:
      type: string
      title: Variant
      enum: [cards, minimal, icon-left]
      default: cards
  required:
    - items
libraryOverrides:
  css:
    component:
      feature-grid.css: {}
