$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Footer'
status: experimental
description: 'Site footer with brand identity, navigation columns, copyright, and social links.'
group: 'Sityos Automate'
props:
  type: object
  properties:
    brand_tagline:
      type: string
      title: 'Brand tagline'
    nav_columns:
      type: array
      title: 'Navigation columns'
      items:
        type: object
        properties:
          heading:
            type: string
          links:
            type: array
            items:
              type: object
              properties:
                label:
                  type: string
                url:
                  type: string
    copyright:
      type: string
      title: Copyright
    social_links:
      type: array
      title: 'Social links'
      items:
        type: object
        properties:
          label:
            type: string
          url:
            type: string
          icon:
            type: string
    logo_dark_url:
      type: string
      title: 'Dark mode logo URL (absolute path)'
    logo_light_url:
      type: string
      title: 'Light mode logo URL (absolute path)'
    sao_theme_path:
      type: string
      title: 'Theme path for logo assets (legacy fallback)'
  required:
    - brand_tagline
    - nav_columns
    - copyright
libraryOverrides:
  css:
    component:
      footer.css: {}
