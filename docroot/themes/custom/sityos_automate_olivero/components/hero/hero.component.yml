$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Hero
status: experimental
description: 'Full-bleed hero section with gradient mesh fallback, background image support, and CTA actions.'
group: 'Sityos Automate'
props:
  type: object
  properties:
    eyebrow:
      type: string
      title: Eyebrow
      description: 'Category label above headline.'
    headline:
      type: string
      title: Headline
      description: 'Main heading. Supports <em> for gradient accent.'
    subtitle:
      type: string
      title: Subtitle
      description: 'Supporting paragraph below the headline.'
    image_url:
      type: string
      title: 'Background image URL'
      description: 'Falls back to gradient mesh when empty.'
    image_alt:
      type: string
      title: 'Background image alt text'
    cta_primary_label:
      type: string
      title: 'Primary CTA label'
    cta_primary_url:
      type: string
      title: 'Primary CTA URL'
    cta_secondary_label:
      type: string
      title: 'Secondary CTA label'
    cta_secondary_url:
      type: string
      title: 'Secondary CTA URL'
    variant:
      type: string
      title: Variant
      description: 'Layout variant.'
      enum: [default, centered, split]
      default: default
    overlay_opacity:
      type: number
      title: 'Overlay opacity'
      description: '0-1. Default 0.5.'
  required:
    - headline
libraryOverrides:
  css:
    component:
      hero.css: {}
