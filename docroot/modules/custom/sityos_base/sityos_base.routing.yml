sityos_base.admin_config_sityos:
  path: '/admin/config/sityos'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'Sityos Settings'
  requirements:
    _permission: 'administer site configuration'
  options:
    _admin_route: TRUE

sityos_base.tagcloud_settings:
  path: '/admin/config/sityos/tagcloud'
  defaults:
    _form: '\Drupal\sityos_base\Form\TagCloudSettingsForm'
    _title: 'TagCloud rendering'
  requirements:
    _permission: 'administer site configuration'
  options:
    _admin_route: TRUE

sityos_base.pexels_settings:
  path: '/admin/config/sityos/pexels'
  defaults:
    _form: '\Drupal\sityos_base\Form\PexelsSettingsForm'
    _title: 'Pexels Integration'
  requirements:
    _permission: 'administer site configuration'
  options:
    _admin_route: TRUE

sityos_base.pexels_import:
  path: '/admin/config/sityos/pexels/import'
  defaults:
    _form: '\Drupal\sityos_base\Form\PexelsImportForm'
    _title: 'Search & Import from Pexels'
  requirements:
    _permission: 'import pexels media'
  options:
    _admin_route: TRUE
