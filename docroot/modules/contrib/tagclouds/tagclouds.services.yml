services:
  tagclouds.tag:
    class: Drupal\tagclouds\TagService
    arguments: [
      '@config.factory',
      '@language_manager',
      '@cache.data',
      '@request_stack',
      '@database',
      '@?content_translation.manager'
    ]
  tagclouds.cloud_builder:
    class: Drupal\tagclouds\CloudBuilder
    arguments: ['@config.factory', '@language_manager', '@entity_type.manager']
