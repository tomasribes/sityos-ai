# Production Docker Compose for Sityos.com
# Optimized for 1 GB RAM Intel Premium Droplet
# Note: 'version' key is obsolete in Docker Compose v2 — removed.

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: sityos_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ..:/var/www/html:cached
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - sityos_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: sityos_php_prod
    volumes:
      - ..:/var/www/html:cached
      - /var/www/sityos/private-files:/var/www/html/private-files:cached
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-sityos_prod}
      DB_USER: ${DB_USER:-sityos_user}
      DB_PASS: ${DB_PASS}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
      SITE_URL: ${SITE_URL:-https://sityos.com}
      APP_ENV: live
      ENVIRONMENT: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sityos_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: sityos_mysql_prod
    environment:
      MYSQL_DATABASE: ${DB_NAME:-sityos_prod}
      MYSQL_USER: ${DB_USER:-sityos_user}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./mysql/production-my.cnf:/etc/mysql/conf.d/sityos.cnf:ro
    networks:
      - sityos_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: sityos_redis_prod
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    networks:
      - sityos_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # MailHog removed for production to save resources
  # Uncomment if email testing is needed in production
  # mailhog:
  #   image: mailhog/mailhog:v1.0.1
  #   container_name: sityos_mailhog_prod
  #   ports:
  #     - "1025:1025"
  #   networks:
  #     - sityos_prod
  #   restart: unless-stopped

volumes:
  mysql_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  sityos_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
