server {
    listen 80;
    server_name localhost sityos.local;

    root /var/www/html/docroot;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Drupal clean URLs
    location / {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
    }

    # Deny access to sensitive Drupal files
    location ~ /\. {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # Deny access to PHP files in these directories
    location ~* ^/(?:sites|profiles)/.*\.php$ {
        deny all;
    }

    # Static file caching
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # Drupal private files protection
    location ~ ^/sites/.*/private/ {
        return 403;
    }

    client_max_body_size 64M;
}
