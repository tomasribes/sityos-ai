# Production Nginx Configuration for Sityos.com
# Optimized for 1GB RAM with SSL and performance optimizations

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# Docker embedded DNS — resolves service names dynamically at request time
# (static upstream blocks resolve at startup before the php container joins the network)
resolver 127.0.0.11 valid=30s ipv6=off;

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name sityos.com www.sityos.com;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name sityos.com www.sityos.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/sityos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sityos.com/privkey.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # Root directory
    root /var/www/html/docroot;
    index index.php index.html;
    
    # Logging
    access_log /var/log/nginx/sityos_access.log;
    error_log /var/log/nginx/sityos_error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # File size limits
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Performance optimizations for 1GB RAM
    # worker_processes and worker_connections are main/events context directives
    # and must be set in nginx.conf (handled by the base image). Only
    # server-level tunables are valid here.
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # Main location block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        
        # Cache static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
        
        # Drupal specific files
        location ~* \.(engine|inc|install|make|module|profile|po|sh|sql|theme|tpl(\.php)?|xtmpl)$ {
            deny all;
        }
        
        location ~* \.(yml|yaml|txt|md)$ {
            deny all;
        }
    }
    
    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_NAME $host;
        
        # PHP optimizations
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
        
        # Rate limiting for API endpoints
        limit_req zone=api burst=20 nodelay;
    }
    
    # Drupal specific locations
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 30d;
    }
    
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
    
    # Private files (should not be accessible via web)
    location ~ ^/private/ {
        deny all;
        return 404;
    }
    
    # PHP files in core directories
    location ~ ^/sites/(default|files)/.*\.php$ {
        deny all;
    }
    
    # Rate limiting for login
    location ~ ^/user {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Maintenance page
    error_page 503 @maintenance;
    location @maintenance {
        rewrite ^(.*)$ /maintenance.html break;
    }
}

# Server block for www redirect
server {
    listen 443 ssl http2;
    server_name www.sityos.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/sityos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sityos.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Redirect to non-www
    return 301 https://sityos.com$request_uri;
}
